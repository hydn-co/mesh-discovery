name: CI
on:
  workflow_call:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * *"
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
defaults:
  run:
    shell: bash
jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: "**/go.sum"
      # Deps are now private (hydn-co/mesh-sdk + substrate); mint a GitHub App token and
      # configure git insteadOf + GOPRIVATE before any module fetch.
      - uses: hydn-co/build-tools/.github/actions/setup-go-private@main
        with:
          client-id: ${{ secrets.MESH_MODULES_APP_CLIENT_ID }}
          private-key: ${{ secrets.MESH_MODULES_APP_KEY }}
      - run: go mod download
      - uses: golangci/golangci-lint-action@v9.2.1
        with:
          version: latest
      - run: go build ./...
      - run: go test ./... -timeout 30s
